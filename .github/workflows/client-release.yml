name: Client Release

on:
  push:
    tags:
      - "client/v*"

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ""

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
          - name: Windows
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundles: msi,nsis
          - name: macOS
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            bundles: dmg
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/client/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/client
          tauriScript: bun run tauri
          args: --target ${{ matrix.platform.rust-target }} --bundles ${{ matrix.platform.bundles }}

      - name: Upload Linux artifacts
        if: matrix.platform.name == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-linux
          path: |
            apps/client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            apps/client/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.platform.name == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-windows
          path: |
            apps/client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.platform.name == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-macos
          path: |
            apps/client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#client/v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "FreezerMan v${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
